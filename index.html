<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Absensi Online</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    background:#f3f5f8;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-bottom:10px;
}

.toolbar select,
.toolbar input{
    height:48px;
    font-size:20px;
    padding:0 10px;
}

.toolbar button{
    height:48px;
    padding:0 15px;
    font-size:16px;
    white-space:nowrap;
}

button{
    cursor:pointer;
}

.table-container{
    overflow:auto;
    max-width:100%;
    max-height:80vh;
}

table{
    border-collapse:collapse;
    width:auto;
}

th,
td{
    border:1px solid #ccc;
    padding:4px 8px;
    white-space:nowrap;
    font-size:22px;
}

th{
    background:#0d6efd;
    color:white;
    position:sticky;
    top:0;
    z-index:10;
}

.nama{
    text-align:left;
    padding-left:10px;
    width:auto;
    font-size:22px;
}

.sticky-no{
    position:sticky;
    left:0;
    background:white;
    z-index:5;
}

th.sticky-no{
    position:sticky;
    left:0;
    top:0;
    background:#0d6efd;
    color:white;
    z-index:20;
}

.h{
    background:#198754;
    color:white;
}

.s{
    background:#ffc107;
}

.i{
    background:#0dcaf0;
    color:white;
}

.a{
    background:#dc3545;
    color:white;
}

.h,
.s,
.i,
.a{
    width:35px;
    height:35px;
    padding:0;
    margin:0;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:6px;
}

.active{
    outline:3px solid black;
}

.kelas-box{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
    gap:8px;
    margin:10px 0;
}

.kelas-box label{
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    background:white;
}

.simpan-aktif{
    background:#198754 !important;
    color:white !important;
}

.download-aktif{
    background:#0d6efd !important;
    color:white !important;
}
</style>
</head>
<body>

<h2>JURNAL MENGAJAR</h2>
<div class="toolbar">
<select id="kelas" onchange="loadSiswa()">
<option value="">Pilih Kelas</option>
<option>7A</option>
<option>7B</option>
<option>7C</option>
<option>7D</option>
<option>7E</option>
<option>7F</option>
<option>7G</option>
<option>7H</option>
<option>7I</option>

<option>8A</option>
<option>8B</option>
<option>8C</option>
<option>8D</option>
<option>8E</option>
<option>8F</option>
<option>8G</option>
<option>8H</option>

<option>9A</option>
<option>9B</option>
<option>9C</option>
<option>9D</option>
<option>9E</option>
<option>9F</option>
<option>9G</option>
<option>9H</option>
<option>9I</option>
</select>

<input type="date" id="tanggal">

<select id="jam">
    <option value="">Pilih Jam</option>
    
    <option>0</option>
    
    <option>1</option>
    <option>1-2</option>
    <option>1-3</option>

    <option>2</option>
    <option>2-3</option>
    <option>2-4</option>

    <option>3</option>
    <option>3-4</option>
    <option>3-5</option>

    <option>4</option>
    <option>4-5</option>
    <option>4-6</option>

    <option>5</option>
    <option>5-6</option>
    <option>5-7</option>

    <option>6</option>
    <option>6-7</option>
    <option>6-8</option>

    <option>7</option>
    <option>7-8</option>

    <option>8</option>
</select>

<select id="mapel">
    <option value="">
        Pilih Mapel
    </option>
</select>

<select id="guru">
    <option value="">
        Pilih Guru
    </option>
</select>

<textarea
id="materi"
placeholder="Materi Ajar"
style="height:48px;font-size:20px;padding:10px;"></textarea>

<button id="btnSimpan" onclick="simpan()">
💾 Simpan
</button>

<button id="btnDownload" onclick="downloadCSV()">
📥 Download
</button>
</div>
    
<div style="overflow:auto">
<div class="table-container">
<table>

<thead>
<tr>
<th class="sticky-no">No</th>
<th>NIS</th>
<th>Nama</th>
<th>L/P</th>
<th>H</th>
<th>S</th>
<th>I</th>
<th>A</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>
</div>
</div>
    
<script>

const API =
"https://script.google.com/macros/s/AKfycbwyTgSY3tVWyQjGky_GrGxR0HXkNCFteIJA_z3CdAzIBlRU_XTFKKmjYcBIqKb2tOPuhg/exec";

let dataSiswa = [];

// =============================
// LOAD SISWA
// =============================

async function loadSiswa(){

    try{

        const kelas =
        document.getElementById(
            "kelas"
        ).value;

        const res =
        await fetch(
            API +
            "?kelas=" +
            encodeURIComponent(
                kelas
            )
        );

        const data =
        await res.json();

        if(!Array.isArray(data)){

            throw new Error(
                "Format data siswa tidak valid"
            );

        }

        dataSiswa =
        data.map(s=>({

            ...s,

            status:"H"

        }));

        render();

    }catch(err){

        console.error(err);


    }

}

// =============================
// LOAD MAPEL
// =============================

async function loadMapel(){

    try{

        const res =
        await fetch(
            API +
            "?master=Mapel"
        );

        const data =
        await res.json();

        const select =
        document.getElementById(
            "mapel"
        );

        select.innerHTML =
        '<option value="">Pilih Mapel</option>';

        data.forEach(m=>{

            const option =
            document.createElement(
                "option"
            );

            option.value =
            m;

            option.textContent =
            m;

            select.appendChild(
                option
            );

        });

    }catch(err){

        console.error(err);


    }

}

// =============================
// LOAD GURU
// =============================

async function loadGuru(){

    try{

        const res =
        await fetch(
            API +
            "?master=Guru"
        );

        const data =
        await res.json();

        const select =
        document.getElementById(
            "guru"
        );

        select.innerHTML =
        '<option value="">Pilih Guru</option>';

        data.forEach(g=>{

            const option =
            document.createElement(
                "option"
            );

            option.value =
            g;

            option.textContent =
            g;

            select.appendChild(
                option
            );

        });

    }catch(err){

        console.error(err);


    }

}

// =============================
// RENDER TABEL
// =============================

function render(){

    let html = "";

    dataSiswa.forEach((s,i)=>{

        html += `
        <tr>

            <td class="sticky-no">
                ${s.no}
            </td>

            <td>
                ${s.nis}
            </td>

            <td class="nama">
                ${s.nama}
            </td>

            <td>
                ${s.jk}
            </td>

            <td>
                <button
                class="h ${s.status==='H'?'active':''}"
                onclick="setStatus(${i},'H')">
                H
                </button>
            </td>

            <td>
                <button
                class="s ${s.status==='S'?'active':''}"
                onclick="setStatus(${i},'S')">
                S
                </button>
            </td>

            <td>
                <button
                class="i ${s.status==='I'?'active':''}"
                onclick="setStatus(${i},'I')">
                I
                </button>
            </td>

            <td>
                <button
                class="a ${s.status==='A'?'active':''}"
                onclick="setStatus(${i},'A')">
                A
                </button>
            </td>

        </tr>
        `;
    });

    document.getElementById(
        "tbody"
    ).innerHTML = html;

}

// =============================
// SET STATUS
// =============================

function setStatus(i,status){

    dataSiswa[i].status =
    status;

    render();

}

// =============================
// SIMPAN JURNAL
// =============================

async function simpan(){

    flashButton(
        "btnSimpan",
        "simpan-aktif"
    );
    
const kelas =
document.getElementById(
    "kelas"
).value;

if(!kelas){

    return;

}

    try{

        if(
            dataSiswa.length === 0
        ){

            return;

        }

        const data = {

            tanggal :
            document.getElementById(
                "tanggal"
            ).value,

            jam :
            document.getElementById(
                "jam"
            ).value,

            kelas :
            document.getElementById(
                "kelas"
            ).value,

            mapel :
            document.getElementById(
                "mapel"
            ).value,

            guru :
            document.getElementById(
                "guru"
            ).value,

            materi :
            document.getElementById(
                "materi"
            ).value,

            absensi :
            dataSiswa,
deviceId :
(
    window.Android &&
    typeof Android.getDeviceId === "function"
)
?
Android.getDeviceId()
:
"",

deviceName :
(
    window.Android &&
    typeof Android.getDeviceName === "function"
)
?
Android.getDeviceName()
:
""

        };

        if(!data.tanggal){

            return;

        }

        if(!data.jam){

            return;

        }

        if(!data.mapel){

            return;

        }

        if(!data.guru){

            return;

        }

        if(
            !String(
                data.materi || ""
            ).trim()
        ){


            return;

        }

const res =
await fetch(
    API,
    {
        method:"POST",
        body:JSON.stringify(data)
    }
);

        const hasil =
        await res.json();

if(
    hasil.status ===
    "success"
){


}else{

    throw new Error(
        hasil.pesan ||
        "Gagal menyimpan data"
    );

}

    }catch(err){

        console.error(err);

        alert(
            "Gagal menyimpan jurnal\n\n" +
            err.message
        );

    }

}

// =============================
// DOWNLOAD CSV
// =============================

async function downloadCSV(){

    flashButton(
        "btnDownload",
        "download-aktif"
    );
    
    const kelas =
    document.getElementById(
        "kelas"
    ).value;

    if(!kelas){
        return;
    }

    const mapel =
    document.getElementById(
        "mapel"
    ).value;

    try{

        let url;

        if(mapel){

            // Download jurnal mapel
            url =
            API +
            "?rekap=" +
            encodeURIComponent(kelas) +
            "&mapel=" +
            encodeURIComponent(mapel);

        }else{

            // Download jurnal kelas
            url =
            API +
            "?rekapkelas=" +
            encodeURIComponent(kelas);

        }

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(
            !Array.isArray(data)
        ){

            throw new Error(
                "Data tidak valid"
            );

        }

        const csv =
        data
        .map(
            row => row.join(";")
        )
        .join("\n");

if(window.Android){

    Android.downloadCSV(csv);

    return;

}

    }catch(err){

        console.error(err);

    }

}

// =============================
// ONLOAD
// =============================

window.onload = function(){

    document.getElementById(
        "tanggal"
    ).value =
    new Date()
    .toISOString()
    .split("T")[0];

    loadMapel();
    loadGuru();
}
function flashButton(id, kelas){

    const btn =
    document.getElementById(id);

    btn.classList.add(kelas);

    setTimeout(()=>{
        btn.classList.remove(kelas);
    },5000);

}
</script>

</body>
</html>
